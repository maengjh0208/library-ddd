services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy # db가 준비된 후에 app 시작

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # 컨테이너 재시작해도 데이터 유지
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
